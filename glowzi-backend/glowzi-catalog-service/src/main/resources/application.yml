spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:postgresql://localhost:5434/catalog_db
    username: app
    password: app
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info