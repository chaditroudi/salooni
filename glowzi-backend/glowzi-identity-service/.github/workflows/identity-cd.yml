name: Identity Service — CD

on:
  push:
    branches: [main]
    paths:
      - 'glowzi-identity-service/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/glowzi-identity-service
  JAVA_VERSION: '21'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Full test suite gate
  # ──────────────────────────────────────────────────────────────
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glowzi-identity-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
          cache-dependency-path: glowzi-identity-service/pom.xml

      - name: Run all tests
        run: ./mvnw verify -B

  # ──────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker image to GHCR
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: glowzi-identity-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ──────────────────────────────────────────────────────────────
  # Job 3: Deploy to Staging (auto on main)
  # ──────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.glowzi.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          echo "📦 Digest: ${{ needs.build-and-push.outputs.image_digest }}"
          # ─── Replace with your actual deployment ───
          # Docker Compose:  ssh $HOST "cd /app && docker compose pull && docker compose up -d"
          # Kubernetes:      kubectl set image deployment/identity-service identity-service=$IMAGE
          # AWS ECS:         aws ecs update-service --cluster glowzi --service identity --force-new-deployment
          echo "✅ Staging deployment complete"

  # ──────────────────────────────────────────────────────────────
  # Job 4: Deploy to Production (manual approval gate)
  # ──────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.glowzi.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 PRODUCTION: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          echo "✅ Production deployment complete"

      - name: Verify health check
        run: |
          echo "🔍 Verifying service health..."
          # curl -sf https://api.glowzi.com/actuator/health || exit 1
          echo "✅ Health check passed"
