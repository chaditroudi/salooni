name: Identity Service — CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'glowzi-identity-service/**'
      - '.github/workflows/identity-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'glowzi-identity-service/**'

defaults:
  run:
    working-directory: glowzi-identity-service

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Compile & Lint
  # ──────────────────────────────────────────────────────────────
  compile:
    name: Compile & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          cache-dependency-path: glowzi-identity-service/pom.xml

      - name: Compile
        run: ./mvnw compile -B -q

      - name: Validate (enforcer, dependency convergence)
        run: ./mvnw validate -B -q

  # ──────────────────────────────────────────────────────────────
  # Job 2: Unit Tests + Architecture Tests
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit & Architecture Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          cache-dependency-path: glowzi-identity-service/pom.xml

      - name: Run unit & architecture tests
        run: >
          ./mvnw test -B
          -Dtest="com.glowzi.identity.unit.**,com.glowzi.identity.architecture.**"
          -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: glowzi-identity-service/target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 3: Integration Tests (Testcontainers + PostgreSQL)
  # ──────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          cache-dependency-path: glowzi-identity-service/pom.xml

      - name: Run integration tests
        run: >
          ./mvnw test -B
          -Dtest="com.glowzi.identity.integration.**"
          -Dsurefire.failIfNoSpecifiedTests=false
        env:
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: glowzi-identity-service/target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 4: Build JAR artifact
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          cache-dependency-path: glowzi-identity-service/pom.xml

      - name: Build JAR (skip tests — already passed)
        run: ./mvnw package -DskipTests -B -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: identity-service-jar
          path: glowzi-identity-service/target/*.jar
          retention-days: 5

  # ──────────────────────────────────────────────────────────────
  # Job 5: Docker Build (verify image builds — no push in CI)
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build (verify)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: glowzi-identity-service
          push: false
          tags: glowzi-identity-service:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
